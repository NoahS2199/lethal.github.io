<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Lethal Company Sell Calculator & Run Tracker</title>
  <meta name="description" content="A Lethal Company overtime sell calculator and expandable image-and-text run tracker with red and blue themes.">
  <style>
    :root{
      color-scheme:dark;
      --bg:#070102;
      --panel:#1b0508;
      --panel-2:#29080d;
      --text:#fff4f5;
      --muted:#d3a4a9;
      --line:rgba(255,67,82,.27);
      --line-strong:rgba(255,67,82,.58);
      --red:#ff3347;
      --red-dark:#a4071a;
      --soft:#ff7885;
      --good:#8dffab;
      --focus-ring:rgba(255,120,133,.42);
      --shadow:0 24px 75px rgba(0,0,0,.52);
      --radius-lg:30px;
      --radius-md:21px;
      --radius-sm:14px;
      --sans:Arial,Helvetica,sans-serif;
      --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
      --tracker-cell-w:clamp(300px,27vw,380px);
      --tracker-cell-h:clamp(245px,24vw,330px);
      --tracker-header-h:70px;
      --tracker-rail-w:58px;
      --tracker-expander:76px;
    }

    *{box-sizing:border-box}
    html{min-height:100%;background:radial-gradient(circle at 8% 0,rgba(255,51,71,.24),transparent 29rem),radial-gradient(circle at 92% 8%,rgba(155,0,25,.18),transparent 34rem),linear-gradient(145deg,#020001,var(--bg) 55%,#130305)}
    body{min-height:100vh;margin:0;color:var(--text);font-family:var(--sans);line-height:1.45;overflow-x:hidden}
    body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background-image:linear-gradient(rgba(255,67,82,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(255,67,82,.045) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(#000,transparent 92%)}
    body.tracker-active{overflow:hidden}
    body.is-board-dragging,body.is-board-dragging *{cursor:grabbing!important;user-select:none!important}
    [hidden]{display:none!important}
    button,input,select{font:inherit}
    button{border:1px solid transparent;border-radius:999px;padding:.8rem 1rem;color:#fff;background:linear-gradient(135deg,var(--red),var(--red-dark));font-weight:900;cursor:pointer;box-shadow:0 12px 30px rgba(255,51,71,.2);transition:transform .14s ease,filter .14s ease,border-color .14s ease,opacity .22s ease,background .14s ease}
    button:hover{transform:translateY(-1px);filter:brightness(1.06)}
    button:active{transform:translateY(1px)}
    button:focus-visible,input:focus-visible,select:focus-visible,[contenteditable]:focus-visible{outline:3px solid var(--focus-ring);outline-offset:2px}
    .secondary,.moon,.add,.shop-tab,.minus{color:var(--text);background:rgba(255,255,255,.05);border-color:var(--line);box-shadow:none}
    .sr{position:absolute!important;width:1px!important;height:1px!important;padding:0!important;margin:-1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important;border:0!important}

    /* Fixed view tabs */
    .view-nav{position:fixed;left:18px;top:50%;z-index:2000;width:132px;display:grid;gap:.72rem;transform:translateY(-50%);transition:opacity .7s ease,filter .7s ease}
    .view-nav.is-idle{opacity:.2;filter:saturate(.55)}
    .view-nav:hover,.view-nav:focus-within{opacity:1;filter:none}
    .view-tab{position:relative;width:100%;min-height:58px;display:flex;align-items:center;justify-content:flex-start;padding:.9rem 1rem;border:1px solid rgba(255,67,82,.36);border-radius:15px;color:#e7b4ba;background:rgba(21,2,5,.93);box-shadow:0 15px 40px rgba(0,0,0,.28);font:900 .92rem/1.15 var(--mono);letter-spacing:.02em;text-transform:uppercase;text-align:left}
    .view-tab:hover{border-color:rgba(255,67,82,.78);background:rgba(84,7,17,.92)}
    .view-tab.active{color:#fff;background:linear-gradient(135deg,#ef2942,#aa071c);border-color:#ff5265}
    .view-tab.active::before{content:"";position:absolute;left:-1px;top:13px;bottom:13px;width:4px;border-radius:5px;background:#fff}

    /* Cross-fade between views */
    .app-view{opacity:0;visibility:hidden;pointer-events:none;transform:translateY(8px);transition:opacity .25s ease,transform .25s ease,visibility 0s linear .25s}
    .app-view.is-active{opacity:1;visibility:visible;pointer-events:auto;transform:none;transition-delay:0s}

    /* Sell view */
    .sell-view{min-height:100vh;padding-left:174px}
    .page{width:min(1240px,calc(100% - 28px));margin:auto;padding:clamp(30px,5vw,50px) 0 38px}
    .cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:1rem;align-items:stretch}
    .card,.rate,.drawer{border:1px solid var(--line);background:linear-gradient(145deg,rgba(28,5,8,.95),rgba(7,1,2,.91));box-shadow:var(--shadow);backdrop-filter:blur(16px)}
    .card{position:relative;min-height:274px;overflow:hidden;display:flex;flex-direction:column;gap:1rem;padding:clamp(1rem,2.4vw,1.35rem);border-radius:var(--radius-md)}
    .card::after{content:attr(data-number);position:absolute;right:-.2rem;bottom:-2rem;color:rgba(255,51,71,.075);font:950 clamp(6rem,13vw,9rem)/1 var(--mono);pointer-events:none}
    .label{position:relative;z-index:1;display:block;color:var(--soft);font:950 .78rem var(--mono);letter-spacing:.12em;text-transform:uppercase}
    .money{position:relative;z-index:1;display:flex;align-items:center;min-height:96px;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(3,0,1,.72);overflow:hidden}
    .prefix{flex:none;padding-left:1rem;color:var(--soft);font:950 clamp(2rem,5vw,3.35rem) var(--mono)}
    .main-input{width:100%;min-width:0;border:0;padding:.95rem 1rem .95rem .45rem;color:var(--text);background:transparent;font-size:clamp(2.15rem,5.5vw,3.75rem);font-weight:950;letter-spacing:-.055em;outline:0;-moz-appearance:textfield}
    .main-input::-webkit-inner-spin-button,.main-input::-webkit-outer-spin-button,.price::-webkit-inner-spin-button,.price::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    .main-input::placeholder{color:rgba(255,244,245,.2)}
    .scrap-money{border-color:rgba(141,255,171,.3);background:radial-gradient(circle at 90% 20%,rgba(255,51,71,.17),transparent 10rem),rgba(3,0,1,.78)}
    .scrap-money .main-input{color:var(--good)}
    .status{position:relative;z-index:1;min-height:2.9em;margin:0;color:var(--muted);font-size:.94rem}
    .overtime-panel{position:relative;z-index:1;display:grid;gap:.68rem;margin-top:auto;padding:.78rem;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(255,255,255,.035)}
    .compact-field{display:grid;grid-template-columns:minmax(0,1fr) 126px;align-items:center;gap:.7rem}
    .compact-label{color:var(--soft);font:900 .7rem/1.2 var(--mono);letter-spacing:.07em;text-transform:uppercase}
    .compact-money{display:flex;align-items:center;min-width:0;border:1px solid var(--line);border-radius:10px;background:rgba(3,0,1,.72);overflow:hidden}
    .compact-prefix{flex:none;padding-left:.62rem;color:var(--soft);font:950 .9rem var(--mono)}
    .compact-input{width:100%;min-width:0;border:0;padding:.62rem .62rem .62rem .24rem;color:var(--text);background:transparent;font:900 .9rem var(--mono);outline:0;-moz-appearance:textfield}
    .compact-input::-webkit-inner-spin-button,.compact-input::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
    .result-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:.45rem}
    .result-tile{min-width:0;padding:.58rem .52rem;border:1px solid rgba(255,67,82,.17);border-radius:10px;background:rgba(3,0,1,.58);text-align:center}
    .result-tile span{display:block;margin-bottom:.2rem;color:var(--muted);font:800 .62rem/1.2 var(--mono);letter-spacing:.045em;text-transform:uppercase}
    .result-tile strong{display:block;overflow:hidden;color:var(--text);font:950 clamp(.88rem,1.45vw,1.08rem)/1.2 var(--mono);text-overflow:ellipsis;white-space:nowrap}
    .result-tile.overtime strong{color:var(--good)}
    .waffle{position:relative;z-index:1;width:100%;min-height:58px;margin-top:auto;display:flex;align-items:center;justify-content:center;gap:.72rem;border-color:var(--line-strong)}
    .waffle-icon{display:grid;grid-template-columns:repeat(3,6px);gap:4px}
    .waffle-icon i{width:6px;height:6px;border-radius:2px;background:currentColor}
    .rate{width:min(330px,100%);margin:1rem auto 0;padding:.85rem;border-radius:var(--radius-sm)}
    .rate label{display:grid;grid-template-columns:1fr minmax(110px,.6fr);align-items:center;gap:.85rem}
    .rate span{color:var(--soft);font:950 .78rem var(--mono);letter-spacing:.11em;text-transform:uppercase}
    select,.search,.price{width:100%;border:1px solid var(--line);border-radius:11px;padding:.78rem .82rem;color:var(--text);background:rgba(3,0,1,.76);outline:0}
    .drawer{display:none;margin-top:1rem;padding:clamp(1rem,2.4vw,1.25rem);border-radius:var(--radius-lg)}
    .drawer.open{display:block}
    .drawer-top{display:flex;justify-content:flex-end;margin-bottom:1rem}
    .close{padding:.6rem .9rem}
    .drawer-grid{display:grid;grid-template-columns:minmax(215px,.75fr) minmax(390px,1.35fr) minmax(250px,.9fr);gap:1rem;align-items:start}
    .panel{min-width:0;padding:1rem;border:1px solid var(--line);border-radius:var(--radius-md);background:rgba(255,255,255,.045)}
    .panel h2{margin:0 0 .9rem;font-size:1.15rem;letter-spacing:-.02em}
    .moon-list,.shop-list,.selected-list{display:grid;gap:.62rem}
    .moon-list,.shop-list{max-height:min(68vh,720px);padding-right:.25rem;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,67,82,.55) rgba(255,255,255,.04)}
    .moon{width:100%;display:flex;align-items:center;justify-content:space-between;gap:.8rem;padding:.72rem .78rem;border-radius:11px;text-align:left}
    .moon.active{border-color:rgba(141,255,171,.48);background:rgba(141,255,171,.1)}
    .name{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .currency{flex:none;color:var(--soft);font:950 .86rem var(--mono)}
    .shop-controls{display:grid;gap:.7rem;margin-bottom:.8rem}
    .shop-tabs{display:flex;flex-wrap:wrap;gap:.45rem}
    .shop-tab{padding:.5rem .7rem;font-size:.8rem}
    .shop-tab.active{border-color:var(--line-strong);background:rgba(255,51,71,.18)}
    .shop-row{display:grid;grid-template-columns:minmax(0,1fr) 108px;gap:.55rem;align-items:stretch}
    .add{min-width:0;display:flex;align-items:center;justify-content:space-between;gap:.7rem;padding:.72rem .78rem;border-radius:11px;text-align:left}
    .count{display:none;flex:none;min-width:25px;padding:.2rem .4rem;border-radius:999px;background:var(--red-dark);font:700 .75rem var(--mono);text-align:center}
    .count.show{display:inline-block}
    .price-wrap{position:relative;min-width:0}
    .price-wrap::before{content:"▮";position:absolute;left:.65rem;top:50%;z-index:1;color:var(--soft);font:950 1rem var(--mono);transform:translateY(-50%);pointer-events:none}
    .price{height:100%;padding-left:1.55rem;font:900 .9rem var(--mono);-moz-appearance:textfield}
    .purchasing{position:sticky;top:1rem}
    .total{display:flex;align-items:baseline;justify-content:space-between;gap:.7rem;margin-bottom:.8rem;padding:.85rem;border:1px solid var(--line-strong);border-radius:var(--radius-sm);background:rgba(255,51,71,.08)}
    .total span{color:var(--muted);font:900 .77rem var(--mono);letter-spacing:.08em;text-transform:uppercase}
    .total strong{color:var(--good);font:950 1.55rem var(--mono)}
    .empty{margin:0;padding:1rem;border:1px dashed var(--line);border-radius:var(--radius-sm);color:var(--muted);text-align:center}
    .selected{position:relative;min-width:0;padding:.78rem 2.8rem .78rem .78rem;border:1px solid var(--line);border-radius:var(--radius-sm);background:rgba(3,0,1,.48)}
    .selected strong{display:block;overflow-wrap:anywhere;line-height:1.2}
    .selected small{display:block;margin-top:.3rem;color:var(--muted);font-family:var(--mono)}
    .minus{position:absolute;top:.5rem;right:.5rem;display:grid;place-items:center;width:31px;height:31px;padding:0;border-radius:9px;font-size:1.25rem;line-height:1}
    .clear{width:100%;margin-top:.85rem;border-radius:11px}

    /* Run Tracker */
    .tracker-view{position:fixed;inset:0;z-index:50;overflow:hidden;background:radial-gradient(circle at 49% 20%,rgba(255,51,71,.09),transparent 31rem)}
    .tracker-canvas{position:absolute;inset:0;overflow:hidden;touch-action:none}
    .tracker-canvas::before{content:"";position:absolute;left:185px;right:14px;top:30px;bottom:30px;border:1px solid rgba(255,67,82,.22);border-radius:25px;pointer-events:none}
    .tracker-board{--tracker-cols:1;--tracker-rows:1;position:absolute;left:0;top:0;display:grid;grid-template-columns:var(--tracker-rail-w) max-content var(--tracker-expander);grid-template-rows:max-content var(--tracker-expander);align-items:stretch;justify-items:stretch;filter:drop-shadow(0 26px 46px rgba(0,0,0,.38));will-change:transform}
    .tracker-grid{grid-column:2;grid-row:1;display:grid;grid-template-columns:repeat(var(--tracker-cols),var(--tracker-cell-w));grid-template-rows:var(--tracker-header-h) repeat(var(--tracker-rows),var(--tracker-cell-h));gap:0;background:#fff;border-left:3px solid var(--red);border-top:3px solid var(--red)}
    .tracker-header{position:relative;display:flex;align-items:center;justify-content:center;min-width:0;color:#fff;background:var(--header-color,#d30d2f);border-right:2px solid rgba(255,255,255,.34);border-bottom:3px solid rgba(255,255,255,.3);cursor:grab;touch-action:none;overflow:hidden}
    .tracker-header:first-child{border-top-left-radius:10px}
    .tracker-header-title{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:0 44px 0 18px;color:inherit;font:900 clamp(1.08rem,1.6vw,1.38rem)/1.1 Arial,Helvetica,sans-serif;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;user-select:text;outline:0}
    .tracker-header.employee .tracker-header-title{padding-inline:18px}
    .delete-column{position:absolute;right:7px;top:50%;display:grid;place-items:center;width:29px;height:29px;padding:0;border:1px solid rgba(255,255,255,.42);border-radius:8px;color:#fff;background:rgba(0,0,0,.24);box-shadow:none;opacity:0;transform:translateY(-50%) scale(.88);pointer-events:none;transition:opacity .14s ease,transform .14s ease,background .14s ease}
    .tracker-header:hover .delete-column,.tracker-header:focus-within .delete-column,.delete-column:focus-visible{opacity:1;transform:translateY(-50%) scale(1);pointer-events:auto}
    .delete-column:hover{transform:translateY(-50%) scale(1.04);background:rgba(0,0,0,.4);filter:none}
    .delete-column svg,.row-delete svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
    .tracker-cell{position:relative;min-width:0;min-height:0;display:flex;flex-wrap:wrap;align-content:center;align-items:center;justify-content:center;gap:.55rem;padding:1.15rem;color:#1f1113;background:#fff;border-right:3px solid rgba(255,51,71,.32);border-bottom:3px solid rgba(255,51,71,.32);font:700 clamp(1.8rem,2.35vw,2.55rem)/1.22 Arial,Helvetica,sans-serif;text-align:center;overflow:auto;overflow-wrap:anywhere;white-space:pre-wrap;caret-color:#000;outline:0;scrollbar-width:thin;scrollbar-color:rgba(190,10,43,.35) transparent}
    .tracker-cell:focus{z-index:2;box-shadow:none}
    .tracker-cell.is-dragover{background:#fff1f3;box-shadow:inset 0 0 0 5px rgba(255,51,71,.55)}
    .tracker-cell img{display:block;max-width:94%;max-height:calc(var(--tracker-cell-h) - 40px);width:auto;height:auto;object-fit:contain;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.16)}
    .tracker-cell br{display:block}
    .row-delete-rail{grid-column:1;grid-row:1;display:grid;grid-template-rows:var(--tracker-header-h) repeat(var(--tracker-rows),var(--tracker-cell-h));align-items:stretch;justify-items:stretch}
    .row-delete-spacer{width:100%;height:100%}
    .row-delete{display:grid;place-items:center;width:100%;height:100%;padding:0;border:2px dashed rgba(255,67,82,.86);border-right:0;border-radius:0;color:var(--soft);background:rgba(255,255,255,.025);box-shadow:none;opacity:0;pointer-events:none;transform:none;transition:opacity .14s ease,background .14s ease,color .14s ease}
    .row-delete.is-visible,.row-delete:focus-visible{opacity:1;pointer-events:auto}
    .row-delete:hover{transform:none;filter:none;color:#fff;background:rgba(255,51,71,.18)}
    .tracker-expander{display:grid;place-items:center;min-width:0;min-height:0;padding:0;border:2px dashed rgba(255,67,82,.9);border-radius:0;color:var(--soft);background:rgba(255,255,255,.025);box-shadow:none;font:400 2.55rem/1 Arial,Helvetica,sans-serif;opacity:0;pointer-events:none;transform:none;transition:opacity .14s ease,background .14s ease,color .14s ease}
    .tracker-expander:hover{transform:none;filter:none;color:#fff;background:rgba(255,51,71,.16)}
    .tracker-expander:active{transform:none;background:rgba(255,51,71,.25)}
    .tracker-expander:focus-visible{opacity:1;pointer-events:auto;outline:3px solid rgba(255,120,133,.48);outline-offset:3px}
    .add-column{grid-column:3;grid-row:1}
    .add-row{grid-column:2;grid-row:2}
    .tracker-board.near-right .add-column,.tracker-board.near-bottom .add-row{opacity:1;pointer-events:auto}


    @media(max-width:1100px){
      .drawer-grid{grid-template-columns:1fr 1fr}.purchasing{position:static;grid-column:1/-1}
      :root{--tracker-cell-w:clamp(290px,36vw,350px);--tracker-cell-h:clamp(235px,31vw,305px)}
    }
    @media(max-width:820px){
      .view-nav{left:10px;top:16px;width:112px;transform:none}
      .view-tab{min-height:52px;padding:.75rem .8rem;font-size:.78rem}
      .sell-view{padding-left:0;padding-top:138px}
      .page{padding-top:16px}
      .cards{grid-template-columns:1fr}.card{min-height:230px}.card::after{font-size:7rem}
      .result-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
      .drawer-grid{grid-template-columns:1fr}.purchasing{grid-column:auto}.moon-list,.shop-list{max-height:none;overflow:visible;padding-right:0}
      .tracker-canvas::before{left:132px;top:12px;bottom:12px}
      :root{--tracker-cell-w:285px;--tracker-cell-h:235px;--tracker-header-h:64px;--tracker-rail-w:50px;--tracker-expander:64px}
      .tracker-cell{font-size:1.75rem}
    }
    @media(max-width:480px){
      .page{width:min(100% - 18px,1240px)}
      .rate label{grid-template-columns:1fr;gap:.45rem}.shop-row{grid-template-columns:minmax(0,1fr) 96px}.panel{padding:.78rem}
      .compact-field{grid-template-columns:1fr}.compact-money{width:100%}.result-grid{grid-template-columns:1fr}
      .tracker-canvas::before{display:none}
      :root{--tracker-cell-w:270px;--tracker-cell-h:220px;--tracker-header-h:62px;--tracker-rail-w:46px;--tracker-expander:58px}
    }
    @media(hover:none){
      .tracker-expander{opacity:.72;pointer-events:auto}
      .row-delete{opacity:.58;pointer-events:auto}
      .delete-column{opacity:.75;transform:translateY(-50%) scale(1);pointer-events:auto}
    }
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important;animation-iteration-count:1!important}}


    /* Current layout and Sorf Mode */
    .inline-rate{position:relative;z-index:1;width:100%;margin:auto 0 0;padding:.72rem;box-shadow:none;background:rgba(255,255,255,.035)}
    .inline-rate label{grid-template-columns:1fr minmax(108px,.58fr)}
    .sorf-toggle{position:fixed;right:18px;top:18px;z-index:3000;min-width:154px;min-height:46px;padding:.72rem 1rem;border:1px solid rgba(255,105,119,.62);border-radius:13px;color:#fff;background:linear-gradient(135deg,#e82942,#930517);box-shadow:0 14px 34px rgba(0,0,0,.34);font:950 .79rem/1.1 var(--mono);letter-spacing:.025em;text-transform:none}
    .sorf-toggle:hover{border-color:#ff8d98}
    .tracker-canvas::before{display:none!important}
    .tracker-header:first-child{border-radius:0!important}
    .tracker-header{user-select:none}
    .tracker-header-grab{position:absolute;left:0;right:38px;top:0;height:38px;z-index:2;cursor:grab;touch-action:none;user-select:none;background:transparent}
    .tracker-header-title{position:relative;z-index:1;width:auto;min-width:48px;max-width:calc(100% - 64px);height:auto;min-height:34px;margin-top:22px;padding:.34rem .58rem;user-select:text}
    .tracker-header.employee .tracker-header-title{max-width:calc(100% - 28px);padding-inline:.58rem}
    .delete-column{z-index:3;top:61%}
    .tracker-cell{display:grid;place-items:center;padding:1.15rem;overflow:auto;white-space:normal;caret-color:auto;outline:0}
    .tracker-cell-editor{position:relative;width:100%;min-width:1px;min-height:1.22em;max-height:100%;color:#171717;font:700 clamp(1.8rem,2.35vw,2.55rem)/1.22 Arial,Helvetica,sans-serif;text-align:center;overflow-wrap:anywhere;white-space:pre-wrap;caret-color:#000;outline:0}
    .tracker-cell-editor:focus,.tracker-cell-editor:focus-visible{outline:none!important}
    .tracker-cell-editor:empty::before{content:"";display:inline-block;height:1em}
    .tracker-cell-editor.has-suggestion::after{content:attr(data-suggestion);color:#aaa;font:inherit;white-space:pre;pointer-events:none}

<body>

              <label for="rate"><span>Selling day</span><select id="rate"><option value="100" selected>100%</option><option value="77">77%</option><option value="53">53%</option><option value="30">30%</option></select></label>
            </section>

            <span class="money"><span class="prefix" aria-hidden="true">▮</span><input id="desired" class="main-input" type="number" min="0" step="1" inputmode="numeric" placeholder="1010" aria-label="Desired amount including overtime"></span>
            <button id="openPurchases" class="waffle" type="button" aria-expanded="false" aria-controls="drawer"><span class="waffle-icon" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>Purchases</button>
          </section>
        </section>


        <section id="drawer" class="drawer" aria-label="Purchase selector">
          <div class="drawer-top"><button id="closePurchases" class="secondary close" type="button">Close</button></div>
          <div class="drawer-grid">

            <section class="panel" aria-labelledby="shopTitle">
              <h2 id="shopTitle">Shop</h2>
              <div class="shop-controls"><label class="sr" for="search">Search shop</label><input id="search" class="search" type="search" placeholder="Search shop"><div id="shopTabs" class="shop-tabs" aria-label="Shop categories"></div></div>
              <div id="shop" class="shop-list"></div>

  <section id="trackerView" class="app-view tracker-view" role="tabpanel" aria-labelledby="trackerTab" aria-hidden="true">
    <div id="trackerCanvas" class="tracker-canvas" aria-label="Expandable run tracker workspace">

        <div id="trackerGrid" class="tracker-grid" role="grid" aria-label="Run tracker"></div>
        <button id="addTrackerColumn" class="tracker-expander add-column" type="button" aria-label="Add a day column"><span aria-hidden="true">+</span></button>
        <button id="addTrackerRow" class="tracker-expander add-row" type="button" aria-label="Add an employee row"><span aria-hidden="true">+</span></button>
      </div>
    </div>
  </section>


  <script>
  (()=>{"use strict";
    const CREDIT="▮",fmt=new Intl.NumberFormat("en-US",{maximumFractionDigits:0});
    // Lethal Company's internal deadline counter is one step higher during the
    // opening quota. At 100% this makes quota 1 use 0, while later quotas use -1.
    const firstQuotaDeadline={100:0,77:1,53:2,30:3};
    const laterQuotaDeadline={100:-1,77:0,53:1,30:2};
    const moons=[
      ["rend","85-Rend",550],["dine","7-Dine",600],["titan","8-Titan",700],["embrion","5-Embrion",150],["artifice","68-Artifice",1500]
    ].map(([id,name,cost])=>({id,name,cost}));
    const items=[
      ["walkie","Walkie-Talkie",10,"Gear"],["flashlight","Flashlight",15,"Gear"],["lockpicker","Lockpicker",20,"Gear"],["weed","Weed Killer",20,"Gear"],["pro-flashlight","Pro-Flashlight",28,"Gear"],["shovel","Shovel",30,"Gear"],["stun","Stun Grenade",30,"Gear"],["belt","Belt Bag",45,"Gear"],["spray","Spray Paint",50,"Gear"],["boombox","Boombox",60,"Gear"],["ladder","Extension Ladder",60,"Gear"],["radar","Radar-Booster",60,"Gear"],["tzp","TZP-Inhalant",80,"Gear"],["survival","Survival Kit",138,"Gear"],["cruiser","Cruiser",370,"Gear"],["zap","Zap Gun",400,"Gear"],["jetpack","Jetpack",900,"Gear"],
      ["horn","Loud Horn",100,"Upgrades"],["signal","Signal Translator",255,"Upgrades"],["teleporter","Teleporter",375,"Upgrades"],["inverse","Inverse Teleporter",425,"Upgrades"],
      ["mat","Welcome Mat",40,"Decor"],["goldfish","Goldfish",50,"Decor"],["pumpkin","Jack O' Lantern",50,"Decor"],["green","Green Suit",60,"Decor"],["purple","Purple Suit",70,"Decor"],["table","Table",70,"Decor"],["microwave","Microwave",80,"Decor"],["dog-house","Dog House",80,"Decor"],["hazard","Hazard Suit",90,"Decor"],["plushie","Plushie Pajama Man",100,"Decor"],["bee","Bee Suit",110,"Decor"],["record","Record Player",120,"Decor"],["romantic","Romantic Table",120,"Decor"],["tv","Television",130,"Decor"],["lights","Cozy Lights",140,"Decor"],["electric-chair","Electric Chair",140,"Decor"],["toilet","Toilet",150,"Decor"],["disco","Disco Ball",150,"Decor"],["sofa","Sofa Chair",150,"Decor"],["shower","Shower",180,"Decor"],["bunny","Bunny Suit",200,"Decor"],["fridge","Fridge",225,"Decor"],["painting","Classic Painting",400,"Decor"],["pajama","Pajama Suit",900,"Decor"]
    ].map(([id,name,price,category])=>({id,name,price,category}));
    const byMoon=Object.fromEntries(moons.map(x=>[x.id,x])),byItem=Object.fromEntries(items.map(x=>[x.id,x]));
    const $=id=>document.getElementById(id),el={quota:$("quota"),scrap:$("scrap"),desired:$("desired"),rate:$("rate"),answerStatus:$("answerStatus"),open:$("openPurchases"),drawer:$("drawer"),close:$("closePurchases"),moons:$("moons"),search:$("search"),tabs:$("shopTabs"),shop:$("shop"),selected:$("selected"),empty:$("empty"),total:$("total"),clear:$("clear")};
    const state={moon:null,cart:{},prices:Object.fromEntries(items.map(x=>[x.id,x.price])),category:"All",search:"",calculatorMode:"target",scrapWasCalculated:false};
    const credits=v=>`${CREDIT}${fmt.format(Math.max(0,Math.floor(Number(v)||0)))}`;
    const read=input=>input.value.trim()===""?null:(Number.isFinite(+input.value)&&+input.value>=0?Math.floor(+input.value):null);
    function deadlineValue(quota,rate){
      const map=quota===130?firstQuotaDeadline:laterQuotaDeadline;
      return map[rate]??0;
    }
    function sale(raw,quota,rate){
      const value=Math.floor(raw*rate/100),fulfilled=value;
      const modifier=15*deadlineValue(quota,rate),met=fulfilled>=quota;
      const overtime=met?Math.max(0,Math.floor((fulfilled-quota)/5)+modifier):0;
      return{raw,value,fulfilled,modifier,overtime,payout:value+overtime,met};
    }
    function minimum(quota,target,rate){const ok=x=>{const r=sale(x,quota,rate);return r.met&&r.payout>=target};let lo=0,hi=1,cap=1e9;while(!ok(hi)&&hi<cap)hi*=2;if(hi>=cap&&!ok(hi))return null;while(lo<hi){const m=Math.floor((lo+hi)/2);if(ok(m))hi=m;else lo=m+1}return lo}
    function calculate(){
      const q=read(el.quota),t=read(el.desired),enteredRaw=read(el.scrap),r=+el.rate.value;
      if(q===null){if(state.scrapWasCalculated){el.scrap.value="";state.scrapWasCalculated=false}el.answerStatus.textContent=(t!==null||enteredRaw!==null)?"Fill in the current quota in box 1 to calculate overtime.":"Enter box 1 and type a sale here, or fill box 3 to solve for the minimum sale.";return}
      if(state.calculatorMode==="target"&&t!==null){
        const raw=minimum(q,t,r);
        if(raw===null){el.scrap.value="";state.scrapWasCalculated=false;el.answerStatus.textContent="No result was found for this target.";return}
        const out=sale(raw,q,r),difference=out.payout-t;
        el.scrap.value=String(raw);state.scrapWasCalculated=true;
        el.answerStatus.textContent=difference===0?`Minimum sale for ${credits(t)} — exact payout with ${credits(out.overtime)} overtime.`:`Minimum sale for ${credits(t)} — pays ${credits(difference)} above the target with ${credits(out.overtime)} overtime.`;
        return
      }
      if(enteredRaw!==null){
        const out=sale(enteredRaw,q,r);
        if(!out.met){el.answerStatus.textContent=`Quota is still short by ${credits(q-out.fulfilled)}; overtime is ${credits(0)}.`;return}
        if(t!==null){const difference=out.payout-t;el.answerStatus.textContent=difference===0?`Exact match for box 3, including ${credits(out.overtime)} overtime.`:difference>0?`${credits(difference)} above box 3, including ${credits(out.overtime)} overtime.`:`${credits(Math.abs(difference))} short of box 3, including ${credits(out.overtime)} overtime.`;return}
        el.answerStatus.textContent=`This sale pays ${credits(out.payout)}, including ${credits(out.overtime)} overtime.`;
        return
      }
      el.answerStatus.textContent=t!==null?"Click box 2 and enter scrap, or edit box 3 to solve automatically.":"Enter a scrap amount here to calculate its overtime payout.";
    }
    function total(){return(state.moon?byMoon[state.moon].cost:0)+Object.entries(state.cart).reduce((sum,[id,qty])=>sum+(state.prices[id]||0)*qty,0)}
    function sync(){const any=!!state.moon||Object.keys(state.cart).length>0;el.desired.value=any?String(total()):"";state.calculatorMode="target";if(!any&&state.scrapWasCalculated){el.scrap.value="";state.scrapWasCalculated=false}calculate()}
    function renderMoons(){el.moons.replaceChildren();moons.forEach(m=>{const b=document.createElement("button");b.type="button";b.className=`moon${state.moon===m.id?" active":""}`;b.dataset.moon=m.id;b.setAttribute("aria-pressed",state.moon===m.id);const n=document.createElement("span"),c=document.createElement("span");n.className="name";c.className="currency";n.textContent=m.name;c.textContent=credits(m.cost);b.append(n,c);b.onclick=()=>selectMoon(m.id);el.moons.append(b)})}
    function selectMoon(id){const old=state.moon;state.moon=old===id?null:id;renderMoons();renderSelected();sync();if(old&&state.moon&&old!==state.moon)showToast(`${byMoon[old].name} replaced with ${byMoon[state.moon].name}.`)}
    function renderTabs(){el.tabs.replaceChildren();["All","Gear","Upgrades","Decor"].forEach(cat=>{const b=document.createElement("button");b.type="button";b.className=`shop-tab${state.category===cat?" active":""}`;b.textContent=cat;b.setAttribute("aria-pressed",state.category===cat);b.onclick=()=>{state.category=cat;renderTabs();renderShop()};el.tabs.append(b)})}
    function isDiscounted(item){return Number(state.prices[item.id])<item.price}
    function updateShopSaleState(row,item,removeButton){const discounted=isDiscounted(item);row.classList.toggle("on-sale",discounted);row.querySelector(".shop-item-box")?.classList.toggle("on-sale",discounted);removeButton.hidden=!discounted;removeButton.setAttribute("aria-hidden",String(!discounted))}
    function renderShop(){
      el.shop.replaceChildren();
      const q=state.search.trim().toLowerCase();
      items.filter(i=>(state.category==="All"||i.category===state.category)&&(!q||i.name.toLowerCase().includes(q))).forEach(i=>{
        const row=document.createElement("div");row.className="shop-row";row.dataset.shopItem=i.id;
        const itemBox=document.createElement("div");itemBox.className="shop-item-box";
        const add=document.createElement("button");add.type="button";add.className="add";add.dataset.item=i.id;
        const name=document.createElement("span"),count=document.createElement("span");name.className="name";name.textContent=i.name;count.className=`count${state.cart[i.id]?" show":""}`;count.textContent=`×${state.cart[i.id]||0}`;add.append(name,count);add.onclick=()=>addItem(i.id);
        const removeSale=document.createElement("button");removeSale.type="button";removeSale.className="remove-sale";removeSale.textContent="Remove Sale";removeSale.setAttribute("aria-label",`Remove sale price for ${i.name}`);
        const wrap=document.createElement("label");wrap.className="price-wrap";const sr=document.createElement("span");sr.className="sr";sr.textContent=`${i.name} price`;
        const input=document.createElement("input");input.className="price";input.type="number";input.min="0";input.step="1";input.inputMode="numeric";input.value=state.prices[i.id];input.dataset.price=i.id;input.setAttribute("aria-label",`${i.name} price`);
        input.oninput=()=>{changePrice(i.id,input.value);updateShopSaleState(row,i,removeSale)};
        removeSale.onclick=event=>{event.stopPropagation();state.prices[i.id]=i.price;input.value=String(i.price);updateShopSaleState(row,i,removeSale);if(state.cart[i.id]){renderSelected();sync()}input.focus()};
        itemBox.append(add,removeSale);wrap.append(sr,input);row.append(itemBox,wrap);el.shop.append(row);updateShopSaleState(row,i,removeSale);
      })
    }
    function addItem(id){state.cart[id]=(state.cart[id]||0)+1;renderShop();renderSelected();sync()}
    function changePrice(id,value){const n=+value;state.prices[id]=Number.isFinite(n)&&n>=0?Math.floor(n):0;if(state.cart[id]){renderSelected();sync()}}

    function ensurePosition(){if(state.positioned){applyPosition();return}requestAnimationFrame(()=>{const leftReserve=window.innerWidth<=820?122:174;state.position.x=Math.max(leftReserve+28,(canvas.clientWidth-board.offsetWidth)/2+leftReserve/2);state.position.y=Math.max(48,(canvas.clientHeight-board.offsetHeight)/2);state.positioned=true;applyPosition()})}
    let drag=null;
    board.addEventListener("pointerdown",event=>{const header=event.target.closest(".tracker-header");if(!header||event.target.closest(".delete-column")||event.button!==0)return;const title=event.target.closest(".tracker-header-title"),handle=event.target.closest(".tracker-header-grab");if(title&&!handle)return;event.preventDefault();drag={pointerId:event.pointerId,startX:event.clientX,startY:event.clientY,originX:state.position.x,originY:state.position.y,moved:false,header}});
    board.addEventListener("pointermove",event=>{if(!drag||event.pointerId!==drag.pointerId)return;const dx=event.clientX-drag.startX,dy=event.clientY-drag.startY;if(!drag.moved&&Math.hypot(dx,dy)<6)return;if(!drag.moved){drag.moved=true;drag.header.setPointerCapture?.(event.pointerId);document.body.classList.add("is-board-dragging");window.getSelection()?.removeAllRanges()}const p=clampPosition(drag.originX+dx,drag.originY+dy);state.position=p;board.style.transform=`translate3d(${Math.round(p.x)}px,${Math.round(p.y)}px,0)`;event.preventDefault()});
    function finishDrag(event){if(!drag||event.pointerId!==drag.pointerId)return;if(drag.moved&&drag.header.hasPointerCapture?.(event.pointerId))drag.header.releasePointerCapture(event.pointerId);document.body.classList.remove("is-board-dragging");drag=null}
    board.addEventListener("pointerup",finishDrag);board.addEventListener("pointercancel",finishDrag);
    function clearProximity(){board.classList.remove("near-right","near-bottom");rail.querySelectorAll(".row-delete.is-visible").forEach(button=>button.classList.remove("is-visible"))}
    function updateProximity(event){const rect=grid.getBoundingClientRect(),x=event.clientX,y=event.clientY;const nearRight=x>=rect.right-42&&x<=rect.right+112&&y>=rect.top-45&&y<=rect.bottom+45;const nearBottom=y>=rect.bottom-42&&y<=rect.bottom+112&&x>=rect.left-55&&x<=rect.right+55;board.classList.toggle("near-right",nearRight);board.classList.toggle("near-bottom",nearBottom);let rowIndex=null;const targetCell=event.target.closest?.(".tracker-cell");if(targetCell)rowIndex=Number(targetCell.dataset.rowIndex);if(rowIndex===null||!Number.isInteger(rowIndex)){const firstColumnCells=[...grid.querySelectorAll('.tracker-cell[data-column-index="0"]')],hit=firstColumnCells.find(cell=>{const r=cell.getBoundingClientRect();return y>=r.top&&y<=r.bottom&&x>=rect.left-90&&x<=rect.right});if(hit)rowIndex=Number(hit.dataset.rowIndex)}rail.querySelectorAll(".row-delete").forEach((button,index)=>button.classList.toggle("is-visible",index===rowIndex))}
    canvas.addEventListener("pointermove",event=>{if(!drag)updateProximity(event)});canvas.addEventListener("pointerleave",event=>{if(!board.contains(event.relatedTarget))clearProximity()});
    document.addEventListener("keydown",event=>{if(!document.body.classList.contains("tracker-active")||!(event.ctrlKey||event.metaKey)||event.altKey)return;const keyName=event.key.toLowerCase();if(keyName==="z"){event.preventDefault();event.shiftKey?redo():undo()}else if(keyName==="y"){event.preventDefault();redo()}},true);
    addColumnButton.addEventListener("click",addColumn);addRowButton.addEventListener("click",()=>addRow());window.addEventListener("resize",()=>{if(state.positioned)applyPosition()});render();window.runTracker={ensurePosition,addColumn,addRow,undo,redo,state};
  })();
  </script>
</body>
